<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Главная страница</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/notifications.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Шрифты -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body data-page="index">
    <!-- Основной контейнер -->
    <div class="container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <div class="neon-effect"></div>
            <div class="neon-line"></div>
            <div class="logo">
                <img src="/images/Avtodor.png" alt="Логотип Автодора" loading="lazy" onerror="this.onerror=null; this.src='/images/logo-fallback.png';">
            </div>
            
            <!-- Навигация -->
            <nav class="nav">
                <ul>    
                    <li><a href="/index.html" class="transition-link active" data-page="index"><i class="fas fa-home"></i>Главная</a></li>
                    <li><a href="/Profile.html" data-page="profile"><i class="fas fa-user"></i>Профиль</a></li>
                </ul>
            </nav>

        <div class="time-widget-center">
            <a title="Точное время в Калуге">
                <img src="https://www.timeserver.ru/widget/586911/time?theme=dark" alt="Точное время в Калуге" />
            </a>
        </div>
            
            <!-- Кнопки авторизации -->
            <button class="login-button" id="loginBtn"><i class="fas fa-lock-open"></i> Войти</button>
            <button id="logoutBtn" style="display: none;"><i class="fas fa-door-open"></i> Выход</button>
        </aside>
        
        <!-- Основное содержимое -->
        <main class="main-content fade-active" id="mainContent" style="display: none;">
            <h1 class="department-title">ДЕПАРТАМЕНТ ПО ОБСЛУЖИВАНИЮ ПОЛЬЗОВАТЕЛЕЙ</h1>
            
            <!-- Контейнер с кнопками -->
                    <div class="data-buttons-container">
                        <!-- Контактный центр -->
                        <div class="data-button">
                            <div class="shine"></div>
                            <a href="/Отчет КЦ.html" data-page="report">
                                <i class="fas fa-headset"></i>
                                <span class="button-text">Контактный центр</span>
                            </a>
                        </div>

                        <!-- Отдел поддержки -->
                        <div class="data-button">
                            <div class="shine"></div>
                            <a href="/Отчет ОПОП.html" data-page="report">
                                <i class="fas fa-users"></i>
                                <span class="button-text">Отдел поддержки обслуживания пользователей</span>
                            </a>
                        </div>

                        <!-- Управление по взысканию -->
                        <div class="data-button">
                            <div class="shine"></div>
                            <a href="/Отчет УВДЗ.html" data-page="report">
                                <i class="fa-solid fa-landmark"></i>
                                <span class="button-text">Управление по взысканию дебиторской задолженности 
                                и работе с нарушителями</span>
                            </a>
                        </div>

                        <!-- Отдел верификации -->
                        <div class="data-button">
                            <div class="shine"></div>
                            <a href="/Отчет Верификации.html" data-page="report">
                                <i class="fas fa-check-circle"></i>
                                <span class="button-text">Отдел верификации</span>
                            </a>
                        </div>

                        <!-- Отдел урегулирования -->
                        <!--<div class="data-button">
                            <div class="shine"></div>
                            <a href="/Отдел по урегулированию убытков.html" data-page="report">
                                <i class="fas fa-chart-line"></i>
                                <span class="button-text">Отдел по урегулированию убытков (В РАЗРАБОТКЕ)</span>
                            </a>
                        </div>-->

                        <!-- Отдел весового контроля -->
                        <div class="data-button">
                            <div class="shine"></div>
                            <a href="/Отдел обработки данных весового и габаритного.html" data-page="report">
                                <i class="fas fa-truck"></i>
                                <span class="button-text">Отдел обработки данных весового и габаритного контроля</span>
                            </a>
                        </div>
                    </div>
        </main>
    </div>

    <!-- Модальное окно входа -->
    <div class="overlay" id="overlay">
        <div class="modal" id="loginModal" aria-hidden="true" role="dialog" aria-labelledby="modalTitle">
            <div class="modal-header">
                <h2 id="modalTitle">Авторизация</h2>
                <button class="modal-close" id="closeModal" aria-label="Закрыть">&times;</button>
            </div>
            <div class="modal-body">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">Логин</label>
                        <input type="text" id="username" name="username" required autocomplete="username" placeholder="Введите логин">
                    </div>
                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Введите пароль">
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn-login">Войти</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Скрипты -->
    <script src="js/script.js"></script>
    <script src="/js/animated-background.js"></script>
    <script src="/js/notifications.js"></script>
</body>
</html>
